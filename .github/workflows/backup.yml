name: Full Project Backup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  make-backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create backup zip
        run: |
          mkdir -p artifacts
          zip -r "artifacts/Drug_load_fully_optional_backup_file.zip" . -x "node_modules/*" ".git/*" ".github/*" "database.db*" "node.exe" "*.zip" "*.log" "dist/*"
            
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drug-load-fully-optional-backup
          path: artifacts/Drug_load_fully_optional_backup_file.zip
