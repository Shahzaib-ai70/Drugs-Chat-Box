name: Backup Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  make-backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure zip is available
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip
      - name: Create backup zip
        run: |
          mkdir -p artifacts
          zip -qr "artifacts/Zaibi Mian Backup file.zip" . \
            -x "node_modules/*" ".git/*" ".github/*" \
            "database.db*" "node.exe"
          ls -lah artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zaibi-Mian-Backup
          path: artifacts/Zaibi Mian Backup file.zip
